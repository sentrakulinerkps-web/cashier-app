<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChinQue POS</title>
    <!-- Fonts: JetBrains Mono + Syne (old style) -->
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome for icons (keep) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS (you can keep style.css, but we'll override with dark theme) -->
    <style>
        /* Dark theme – exactly like your old app */
        :root {
            --green: #4CAF50;
            --green-dim: #2e7d32;
            --bg: #0c0c0c;
            --card: #161616;
            --card2: #1e1e1e;
            --border: #2a2a2a;
            --text: #ffffff;
            --text-dim: #888888;
            --red: #ef5350;
            --orange: #FF9800;
            --blue: #2196F3;
            --purple: #9C27B0;
            --yellow: #FFC107;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Syne', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        /* Header */
        .page-header {
            padding: 16px 20px 12px;
            font-size: 20px;
            font-weight: 700;
            border-bottom: 1px solid var(--border);
            background: var(--bg);
        }
        /* Content */
        .page-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
        }
        /* Bottom nav */
        .bottom-nav {
            display: flex;
            background: #111;
            border-top: 1px solid var(--border);
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
        }
        .nav-btn {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px 4px 12px;
            gap: 4px;
            background: none;
            border: none;
            color: var(--text-dim);
            font-family: 'Syne', sans-serif;
            font-size: 10px;
            font-weight: 600;
            cursor: pointer;
        }
        .nav-btn.active { color: var(--green); }
        .nav-btn i { font-size: 22px; }
        .nav-badge {
            position: absolute;
            top: 6px;
            right: 50%;
            transform: translateX(8px);
            background: var(--green);
            color: #000;
            font-size: 9px;
            font-weight: 800;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        /* Inputs */
        input, textarea {
            width: 100%;
            background: var(--card2);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-family: 'Syne', sans-serif;
            font-size: 14px;
            padding: 12px 14px;
            outline: none;
        }
        input:focus, textarea:focus { border-color: var(--green); }
        /* Buttons */
        .btn-green {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: var(--green);
            color: #000;
            font-weight: 700;
            border: none;
            border-radius: 10px;
            padding: 14px 20px;
            cursor: pointer;
        }
        .btn-red {
            background: transparent;
            color: var(--red);
            border: 2px solid var(--red);
            border-radius: 10px;
            padding: 12px 20px;
            cursor: pointer;
        }
        /* Cards */
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 12px;
        }
        /* Clock */
        .clock-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }
        .clock-time {
            font-family: 'JetBrains Mono', monospace;
            font-size: 22px;
            color: var(--green);
            font-weight: 700;
        }
        .order-no span {
            font-size: 28px;
            color: var(--text);
            font-weight: 800;
        }
        /* Receipt preview */
        .receipt-box {
            background: var(--card);
            border: 1px solid var(--green-dim);
            border-radius: 12px;
            padding: 16px;
            position: relative;
        }
        .receipt-text {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            line-height: 1.7;
            color: #ddd;
            white-space: pre-wrap;
        }
        /* Add any other old styles you need */
    </style>
</head>
<body>
    <!-- Header with order number and time -->
    <div class="page-header">
        <div style="display:flex; justify-content:space-between; align-items:center">
            <div>
                <div class="clock-time" id="current-time">17:14:26</div>
                <div style="font-size:12px; color:var(--text-dim)" id="current-date">Mar 4, 2026</div>
            </div>
            <div class="order-no">
                ORDER #<br><span id="order-number">1</span>
            </div>
        </div>
    </div>

    <!-- Main content (loaded dynamically) -->
    <main id="content-container" class="page-content">
        <!-- Receipt tab content will be inserted here -->
    </main>

    <!-- Bottom navigation (same as new script expects) -->
    <nav class="bottom-nav">
        <button class="nav-btn active" data-tab="receipt"><i class="fas fa-receipt"></i>Receipt<span id="pending-count" class="nav-badge hidden">0</span></button>
        <button class="nav-btn" data-tab="pending"><i class="fas fa-clock"></i>Pending</button>
        <button class="nav-btn" data-tab="delivery"><i class="fas fa-truck"></i>Delivery</button>
        <button class="nav-btn" data-tab="completed"><i class="fas fa-check-circle"></i>Completed</button>
        <button class="nav-btn" data-tab="more"><i class="fas fa-ellipsis-h"></i>More</button>
    </nav>

    <!-- Loading overlay (unchanged) -->
    <div id="loading-overlay" class="hidden" style="position:fixed; inset:0; background:rgba(0,0,0,0.7); display:flex; align-items:center; justify-content:center; z-index:100;">
        <div style="background:var(--card); padding:20px; border-radius:12px; text-align:center;">
            <div style="border:4px solid var(--border); border-top-color:var(--green); width:40px; height:40px; border-radius:50%; animation:spin 1s linear infinite; margin-bottom:10px;"></div>
            <p>Processing...</p>
        </div>
    </div>
    <style>@keyframes spin { to { transform: rotate(360deg); } }</style>

    <!-- Toast messages (unchanged) -->
    <div id="sync-error" class="hidden" style="position:fixed; top:20px; right:20px; background:rgba(239,68,68,0.9); color:white; padding:12px 20px; border-radius:8px; z-index:200;">Sync failed. Retrying...</div>
    <div id="success-toast" class="hidden" style="position:fixed; top:20px; right:20px; background:var(--green); color:black; padding:12px 20px; border-radius:8px; z-index:200;"><span id="success-message">Success!</span></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
