<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChinQue POS - Modern Point of Sale</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Inter', sans-serif;
        }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
        
        .receipt-shadow {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        
        .transition-all {
            transition: all 0.3s ease;
        }
        
        .bottom-nav-active {
            color: #3B82F6;
            transform: translateY(-2px);
        }
        
        .loading-pulse {
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .slide-in {
            animation: slideIn 0.3s ease-out;
        }
        
        @keyframes slideIn {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        .fade-in {
            animation: fadeIn 0.4s ease-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .success-bounce {
            animation: successBounce 0.5s ease;
        }
        
        @keyframes successBounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen">
    <!-- Top Header -->
    <header class="bg-white shadow-sm sticky top-0 z-10">
        <div class="container mx-auto px-4 py-3">
            <div class="flex justify-between items-center">
                <div class="flex items-center space-x-2">
                    <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center">
                        <i class="fas fa-cash-register text-white text-lg"></i>
                    </div>
                    <div>
                        <h1 class="text-xl font-bold text-gray-900">ChinQue POS</h1>
                        <div class="flex items-center space-x-2 text-xs text-gray-500">
                            <span id="current-time" class="font-medium">07:46:47</span>
                            <span>•</span>
                            <span id="current-date" class="font-medium">Mar 4, 2026</span>
                        </div>
                    </div>
                </div>
                <div class="flex items-center space-x-4">
                    <div class="hidden md:flex items-center space-x-3">
                        <div class="text-right">
                            <div class="text-xs text-gray-500">Order #</div>
                            <div class="text-lg font-bold text-blue-600" id="order-number">2</div>
                        </div>
                        <div class="w-10 h-10 rounded-full bg-gradient-to-r from-blue-500 to-indigo-600 flex items-center justify-center">
                            <span class="text-white font-bold">CQ</span>
                        </div>
                    </div>
                    <button id="settings-btn" class="p-2 rounded-lg hover:bg-gray-100">
                        <i class="fas fa-cog text-gray-500"></i>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="container mx-auto px-4 py-6 pb-24">
        <div id="content-container">
            <!-- Content will be loaded here based on active tab -->
        </div>
    </main>

    <!-- Fixed Bottom Navigation -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 shadow-lg z-20">
        <div class="container mx-auto">
            <div class="flex justify-around items-center py-3">
                <!-- Receipt Tab -->
                <button class="bottom-nav-item flex flex-col items-center justify-center p-2 transition-all relative" data-tab="receipt">
                    <i class="fas fa-receipt text-2xl mb-1"></i>
                    <span class="text-xs font-medium">Receipt</span>
                    <div class="absolute -top-1 -right-1 w-5 h-5 bg-blue-500 text-white text-xs rounded-full flex items-center justify-center hidden" id="pending-count">0</div>
                </button>
                
                <!-- Pending Tab -->
                <button class="bottom-nav-item flex flex-col items-center justify-center p-2 transition-all" data-tab="pending">
                    <i class="fas fa-clock text-2xl mb-1"></i>
                    <span class="text-xs font-medium">Pending</span>
                </button>
                
                <!-- Delivery Tab -->
                <button class="bottom-nav-item flex flex-col items-center justify-center p-2 transition-all" data-tab="delivery">
                    <i class="fas fa-truck text-2xl mb-1"></i>
                    <span class="text-xs font-medium">Delivery</span>
                </button>
                
                <!-- Completed Tab -->
                <button class="bottom-nav-item flex flex-col items-center justify-center p-2 transition-all" data-tab="completed">
                    <i class="fas fa-check-circle text-2xl mb-1"></i>
                    <span class="text-xs font-medium">Completed</span>
                </button>
                
                <!-- More Tab -->
                <button class="bottom-nav-item flex flex-col items-center justify-center p-2 transition-all" data-tab="more">
                    <i class="fas fa-ellipsis-h text-2xl mb-1"></i>
                    <span class="text-xs font-medium">More</span>
                </button>
            </div>
        </div>
    </nav>

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="fixed inset-0 bg-black bg-opacity-50 z-30 flex items-center justify-center hidden">
        <div class="bg-white rounded-xl p-6 flex flex-col items-center">
            <div class="w-12 h-12 border-4 border-blue-200 border-t-blue-600 rounded-full animate-spin mb-4"></div>
            <p class="text-gray-700 font-medium">Processing...</p>
        </div>
    </div>

    <!-- Sync Error Toast -->
    <div id="sync-error" class="fixed top-4 right-4 bg-red-100 border-l-4 border-red-500 text-red-700 p-4 rounded-lg shadow-lg z-40 hidden">
        <div class="flex items-center">
            <i class="fas fa-exclamation-triangle mr-3"></i>
            <div>
                <p class="font-medium">Sync Error</p>
                <p class="text-sm">Failed to save order. Retrying...</p>
            </div>
            <button class="ml-4 text-red-500 hover:text-red-700" onclick="document.getElementById('sync-error').classList.add('hidden')">
                <i class="fas fa-times"></i>
            </button>
        </div>
    </div>

    <!-- Success Toast -->
    <div id="success-toast" class="fixed top-4 right-4 bg-green-100 border-l-4 border-green-500 text-green-700 p-4 rounded-lg shadow-lg z-40 hidden">
        <div class="flex items-center">
            <i class="fas fa-check-circle mr-3"></i>
            <div>
                <p class="font-medium">Success!</p>
                <p class="text-sm" id="success-message">Order saved successfully</p>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        lucide.createIcons();
    </script>
    <script src="script.js"></script>
</body>
</html>
